<app-loader [show]="isLoading"></app-loader>

<ng-container *ngIf="!isLoading">
  <app-header [animatedIn]="headerAnimated"></app-header>
  <app-mobile-menu></app-mobile-menu>
  <app-social-sidebar [animatedIn]="sidebarAnimated"></app-social-sidebar>
  <app-email-sidebar [animatedIn]="emailSidebarAnimated"></app-email-sidebar>

  <!-- Home route: hero + all portfolio sections including research -->
  <ng-container *ngIf="isHomeRoute">
    <main class="main-content">
      <app-hero [animatedIn]="heroAnimated"></app-hero>
      <div [class.fade-in]="contentAnimated">
        <app-about id="about"></app-about>
        <app-skills id="skills"></app-skills>
        <app-experience id="experience"></app-experience>
        <app-projects id="projects"></app-projects>
        <app-contact id="contact"></app-contact>
        <app-research-list id="research"></app-research-list>
      </div>
    </main>
  </ng-container>

  <!-- Research detail route rendered here -->
  <router-outlet></router-outlet>

  <app-footer></app-footer>
</ng-container>
