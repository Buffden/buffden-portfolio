<header>
  <nav class="nav">
    <div class="logo">
      <a href="/"
         aria-label="home"
         class="wordmark">
        <span class="wm-text">Buffden</span><span class="wm-dot">.</span>
      </a>
    </div>

    <app-theme-toggle class="theme-toggle--mobile"></app-theme-toggle>

    <div class="nav-links">
      <ol>
        <li *ngFor="let item of navItems">
          <a [href]="'#' + item.section"
             (click)="scrollToSection($event, item.section)"
             [class.active]="isNavItemActive(item.section)">{{ item.label }}</a>
        </li>
      </ol>
      <app-theme-toggle class="theme-toggle--desktop"></app-theme-toggle>
      <button (click)="openPdfViewer()"
              class="resume-button">
        Resume
      </button>
    </div>
  </nav>
</header>
