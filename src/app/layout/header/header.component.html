<header>
  <nav class="nav">
    <div class="logo">
      <a href="/"
         aria-label="home"
         class="wordmark">
        <span class="wm-text">Buffden</span><span class="wm-dot">.</span>
      </a>
    </div>

    <div class="nav-links">
      <ol>
        <li>
          <a href="#about"
             (click)="scrollToSection($event, 'about')"
             [class.active]="activeSection === 'about'">About</a>
        </li>
        <li>
          <a href="#skills"
             (click)="scrollToSection($event, 'skills')"
             [class.active]="activeSection === 'skills'">Skills</a>
        </li>
        <li>
          <a href="#experience"
             (click)="scrollToSection($event, 'experience')"
             [class.active]="activeSection === 'experience'">Experience</a>
        </li>
        <li>
          <a href="#projects"
             (click)="scrollToSection($event, 'projects')"
             [class.active]="activeSection === 'projects'">Work</a>
        </li>
        <li>
          <a href="#research"
             (click)="scrollToSection($event, 'research')"
             [class.active]="activeSection === 'research' || isResearchRoute">Research</a>
        </li>
        <li>
          <a href="#blog"
             (click)="scrollToSection($event, 'blog')"
             [class.active]="activeSection === 'blog' || isBlogRoute">Blog</a>
        </li>
        <li>
          <a href="#contact"
             (click)="scrollToSection($event, 'contact')"
             [class.active]="activeSection === 'contact'">Contact</a>
        </li>
      </ol>
      <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="themeService.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
        @if (themeService.isDark()) {
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        }
      </button>
      <button (click)="openPdfViewer()"
              class="resume-button">
        Resume
      </button>
    </div>
  </nav>
</header>
