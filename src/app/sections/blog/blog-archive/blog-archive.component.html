<div class="archive-page">
  <div class="container">

    <a (click)="backToPortfolio()" class="back-link">
      <span class="back-arrow">&#8592;</span> Back to Portfolio
    </a>

    <header class="archive-header">
      <h1 class="archive-title">All Blog Posts</h1>
      <p class="archive-subtitle">Deep dives on architecture, security, and the engineering decisions that actually mattered.</p>
    </header>

    <table class="archive-table">
      <thead>
        <tr>
          <th class="col-year">Year</th>
          <th class="col-title">Title</th>
          <th class="col-platform">Platform</th>
          <th class="col-tags">Tags</th>
          <th class="col-link">Link</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let blog of blogs" class="archive-row">
          <td class="col-year">
            <span class="year-text">{{ blog.year }}</span>
          </td>
          <td class="col-title">
            <span class="blog-title">{{ blog.title }}</span>
          </td>
          <td class="col-platform">
            <span class="platform-badge">{{ blog.platform }}</span>
          </td>
          <td class="col-tags">
            <ul class="tags-list">
              <li *ngFor="let tag of blog.tags" class="tag-item">{{ tag }}</li>
            </ul>
          </td>
          <td class="col-link">
            <a
              [href]="blog.link"
              target="_blank"
              rel="noopener noreferrer"
              class="link-icon"
              title="Read Post"
              (click)="$event.stopPropagation()">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </a>
          </td>
        </tr>
      </tbody>
    </table>

  </div>
</div>
