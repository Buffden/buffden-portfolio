<section id="blog" class="blog">
  <div class="container">

    <h2 class="section-heading">
      <span class="number">06.</span> Writing
    </h2>
    <p class="section-subtitle">
      Technical writing on systems I've shipped, security patterns I've explored, and engineering decisions that didn't make it into the README.
    </p>

    <div class="blogs-grid">
      <div class="blog-card" *ngFor="let blog of blogs">
        <div class="card-top">
          <div class="card-meta">
            <span class="card-platform">{{ blog.platform }}</span>
            <span class="card-date">{{ blog.date }}</span>
          </div>
          <a [href]="blog.link" target="_blank" rel="noopener noreferrer" class="card-link-icon" aria-label="Read post">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
              <polyline points="15 3 21 3 21 9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
          </a>
        </div>
        <h3 class="card-title">
          <a [href]="blog.link" target="_blank" rel="noopener noreferrer">{{ blog.title }}</a>
        </h3>
        <p class="card-summary">{{ blog.summary }}</p>
        <div class="card-tags">
          <span class="tag" *ngFor="let tag of blog.tags">{{ tag }}</span>
        </div>
      </div>
    </div>

    <div class="view-all-wrapper">
      <a class="view-all-btn" [routerLink]="['/blog/archive']">View all my blogs</a>
    </div>

  </div>
</section>
