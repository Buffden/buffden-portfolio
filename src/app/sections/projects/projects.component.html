<section #projectsSection id="projects" class="projects">
  <div class="container">
    <h2 class="section-heading">
      <span class="number">04.</span> Some Things I've Built
    </h2>
    <div class="featured-projects">
      <div
        class="project-card"
        *ngFor="let project of projects; let i = index"
        [class.reverse]="i % 2 === 1"
        #projectCard
      >
        <div class="project-image">
          <a
            [href]="getProjectLink(project)"
            target="_blank"
            rel="noopener noreferrer"
            (click)="trackProjectClick(project.title, 'image', getProjectLink(project))"
          >
            <img [src]="project.image" [alt]="project.title" />
          </a>
        </div>
        <div class="project-content">
          <p class="project-type">{{ project.type }}</p>
          <h3 class="project-title">
            <a
              [href]="getProjectLink(project)"
              target="_blank"
              rel="noopener noreferrer"
              (click)="trackProjectClick(project.title, 'title', getProjectLink(project))"
            >
              {{ project.title }}
            </a>
          </h3>
          <ul class="project-description">
            <li *ngFor="let point of project.descriptionPoints">
              {{ point }}
            </li>
          </ul>
          <ul class="project-tech-list">
            <li *ngFor="let tech of project.tech">{{ tech }}</li>
          </ul>
          <div class="project-links">
            <a
              *ngFor="let githubLink of project.github"
              [href]="githubLink"
              target="_blank"
              aria-label="GitHub Link"
              class="github-link"
              (click)="trackProjectClick(project.title, 'github', githubLink)"
            >
              <svg 
                xmlns="http://www.w3.org/2000/svg" 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                stroke-width="2" 
                stroke-linecap="round" 
                stroke-linejoin="round" 
                class="feather feather-github"
              >
                <title>GitHub</title>
                <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
              </svg>
            </a>
            <a
              *ngIf="project.external"
              [href]="project.external"
              target="_blank"
              aria-label="External Link"
              (click)="trackProjectClick(project.title, 'external', project.external!)"
            >
              <svg 
                xmlns="http://www.w3.org/2000/svg" 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                stroke-width="2" 
                stroke-linecap="round" 
                stroke-linejoin="round" 
                class="feather feather-external-link"
              >
                <title>External</title>
                <path d="M18 13v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                <polyline points="15 3 21 3 21 9"></polyline>
                <line x1="10" y1="14" x2="21" y2="3"></line>
              </svg>
            </a>
            <a
              *ngIf="project.npmPackage && npmDownloads[project.npmPackage]"
              [href]="project.external"
              target="_blank"
              aria-label="npm Downloads"
              class="npm-downloads-link"
              (click)="trackProjectClick(project.title, 'npm_downloads', project.external!)"
            >
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="npm-icon">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              <span class="npm-download-count">{{ npmDownloads[project.npmPackage!] | number }}</span>
            </a>
          </div>
        </div>
      </div>
    </div>
    <!-- Dummy grid below projects -->
    <h2 class="mini-section-heading">Other Noteworthy Projects</h2>
    <a class="archive-link" [routerLink]="['/project/archive']" (click)="onArchiveClick()">View all projects</a>
  </div>
</section>
