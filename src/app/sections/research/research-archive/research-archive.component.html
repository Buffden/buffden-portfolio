<div class="archive-page">
  <div class="container">

    <a (click)="backToPortfolio()" class="back-link">
      <span class="back-arrow">&#8592;</span> Back to Portfolio
    </a>

    <header class="archive-header">
      <h1 class="archive-title">All Research Papers</h1>
      <p class="archive-subtitle">A curated collection of academic paper reviews in security and privacy.</p>
    </header>

    <table class="archive-table">
      <thead>
        <tr>
          <th class="col-title">Title</th>
          <th class="col-venue">Venue</th>
          <th class="col-tags">Tags</th>
          <th class="col-desc">Summary</th>
          <th class="col-links">Links</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let paper of papers" class="archive-row" [routerLink]="['/research', paper.slug]">
          <td class="col-title">
            <span class="paper-title">{{ paper.title }}</span>
            <br>
            <span class="year-text">'{{ paper.year % 100 | number:'2.0-0' }}</span>
          </td>
          <td class="col-venue">
            <span class="venue-badge">{{ paper.venue }}</span>
          </td>
          <td class="col-tags">
            <ul class="tags-list">
              <li *ngFor="let tag of paper.tags" class="tag-item">{{ tag }}</li>
            </ul>
          </td>
          <td class="col-desc">
            <p class="paper-desc">{{ paper.oneLiner }}</p>
          </td>
          <td class="col-links">
            <div class="links-group">
              <a
                [href]="paper.link"
                target="_blank"
                rel="noopener"
                class="link-icon"
                title="Read Paper"
                (click)="$event.stopPropagation()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                  <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                  <polyline points="15 3 21 3 21 9"/>
                  <line x1="10" y1="14" x2="21" y2="3"/>
                </svg>
              </a>
              <a
                [routerLink]="['/research', paper.slug]"
                class="link-icon review-icon"
                title="Read Review"
                (click)="$event.stopPropagation()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                  <line x1="16" y1="13" x2="8" y2="13"/>
                  <line x1="16" y1="17" x2="8" y2="17"/>
                  <polyline points="10 9 9 9 8 9"/>
                </svg>
              </a>
            </div>
          </td>
        </tr>
      </tbody>
    </table>

  </div>
</div>
