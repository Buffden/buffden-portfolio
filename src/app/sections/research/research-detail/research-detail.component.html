<div class="detail-page">
  <div class="container">

    <!-- Not Found -->
    <ng-container *ngIf="notFound">
      <a routerLink="/" class="back-link">
        <span class="back-arrow">&#8592;</span> Back to Research
      </a>
      <p class="not-found">Paper not found.</p>
    </ng-container>

    <!-- Paper Detail -->
    <ng-container *ngIf="paper">

      <a (click)="backToButtonClick()" class="back-link" style="cursor:pointer">
        <span class="back-arrow">&#8592;</span> Back to Research
      </a>

      <!-- Metadata -->
      <header class="paper-header">
        <div class="meta-top">
          <span class="venue">{{ paper.venue }} {{ paper.year }}</span>
          <div class="tags">
            <span class="tag" *ngFor="let tag of paper.tags">{{ tag }}</span>
          </div>
        </div>
        <h1 class="paper-title">{{ paper.title }}</h1>
        <p class="authors">{{ paper.authors }}</p>
        <p class="one-liner">{{ paper.oneLiner }}</p>
      </header>

      <!-- Review Body -->
      <section class="review-body">
        <h2 class="review-heading">Review</h2>

        <ng-container *ngIf="reviewParagraphs.length > 0; else emptyReview">
          <p *ngFor="let para of reviewParagraphs" class="review-para">{{ para }}</p>
        </ng-container>

        <ng-template #emptyReview>
          <p class="review-placeholder">
            Review coming soon. Check back later.
          </p>
        </ng-template>
      </section>

      <!-- Prev / Next Navigation -->
      <nav class="paper-nav">
        <a
          *ngIf="prevPaper; else prevPlaceholder"
          [routerLink]="['/research', prevPaper.slug]"
          class="nav-btn prev">
          <span class="nav-label">&#8592; Previous</span>
          <span class="nav-title">{{ prevPaper.title }}</span>
        </a>
        <ng-template #prevPlaceholder>
          <span class="nav-btn prev disabled"></span>
        </ng-template>

        <a
          *ngIf="nextPaper; else nextPlaceholder"
          [routerLink]="['/research', nextPaper.slug]"
          class="nav-btn next">
          <span class="nav-label">Next &#8594;</span>
          <span class="nav-title">{{ nextPaper.title }}</span>
        </a>
        <ng-template #nextPlaceholder>
          <span class="nav-btn next disabled"></span>
        </ng-template>
      </nav>

    </ng-container>
  </div>
</div>
