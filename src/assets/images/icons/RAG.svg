  <line x1="47" y1="24" x2="66" y2="24" stroke="#111" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="28" y1="32" x2="47" y2="32" stroke="#111" stroke-width="3.5" stroke-linecap="round"/>
