  <line x1="47" y1="56" x2="66" y2="56" stroke="#111" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="28" y1="64" x2="47" y2="64" stroke="#111" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="47" y1="72" x2="66" y2="72" stroke="#111" stroke-width="3.5" stroke-linecap="round"/>
